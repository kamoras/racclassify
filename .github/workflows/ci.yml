name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Type check
        run: mypy src/racclassify/

      - name: Run unit tests
        run: pytest --cov=src/racclassify --cov-report=term-missing -v

  integration:
    name: Integration tests (real model)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-paraphrase-MiniLM-L3-v2-v1

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        env:
          RACCLASSIFY_RUN_INTEGRATION: "1"
        run: pytest tests/test_integration.py -v

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  smoke:
    name: Smoke test (clean install from wheel)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install from wheel (no source, no dev deps)
        run: pip install dist/*.whl

      - name: Smoke test
        run: |
          python - <<'EOF'
          import numpy as np
          from racclassify import Classifier, ClassificationResult

          # Verify package is importable and API works using a custom encoder
          # (avoids downloading a model — that's the integration test's job)
          def enc(texts):
              rng = np.random.default_rng(42)
              return rng.random((len(texts), 16)).astype(np.float32)

          clf = Classifier(
              {"BILLING": "payments charges invoices", "TECH": "bugs errors crashes"},
              encoder=enc,
          )
          result = clf.classify("My invoice was wrong")
          assert isinstance(result, ClassificationResult), f"got {type(result)}"
          assert result.label in ("BILLING", "TECH"), f"unexpected label: {result.label}"
          print(f"smoke OK  label={result.label!r}  confidence={result.confidence:.3f}")
          EOF
